name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_API_LEVEL: '35'
      ANDROID_BUILD_TOOLS: '35.0.0'
      ANDROID_NDK_VERSION: '25.2.9519653'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK / NDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "platform-tools" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Verify NDK install
        run: |
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}"
          "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}/ndk-build" --version

      - name: Ensure gradlew executable
        run: chmod +x ./gradlew

      - name: Scan JNI sources
        run: ./gradlew --no-daemon :app:scanNativeSources

      - name: Build debug APK (includes externalNativeBuild)
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Build release APK (includes externalNativeBuild)
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: androlua-professional-apks
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
